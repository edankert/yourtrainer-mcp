# nginx reverse-proxy vhost for the hosted MCP (alternative to deploy/Caddyfile,
# for hosts where nginx already owns :80/:443).
#
# Serves https://mcp.your-applications.com/your-trainer  ->  127.0.0.1:8080
# (the systemd service from deploy/yourtrainer-mcp.service).
#
# TLS: mcp.your-applications.com is grey-cloud (DNS-only) in Cloudflare, so the
# origin must present a publicly-trusted cert. Obtain a Let's Encrypt cert for
# mcp.your-applications.com and place it at the paths below (matching this box's
# /etc/nginx/ssl-certificates/ convention), or adjust the paths to your ACME
# client's output. Then: nginx -t && systemctl reload nginx
#
# Privacy: the access_log format below logs request metadata only — never the
# request body. Do NOT add $request_body to any log_format for this vhost.

server {
    listen 80;
    listen [::]:80;
    server_name mcp.your-applications.com;

    # Allow HTTP-01 ACME challenges (if your ACME client uses webroot).
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mcp.your-applications.com;

    ssl_certificate     /etc/nginx/ssl-certificates/mcp.your-applications.com.crt;
    ssl_certificate_key /etc/nginx/ssl-certificates/mcp.your-applications.com.key;

    access_log /var/log/nginx/mcp.your-applications.com.access.log;
    error_log  /var/log/nginx/mcp.your-applications.com.error.log;

    # MCP streamable-HTTP endpoint -> local service.
    location /your-trainer {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        # Streaming (SSE / streamable HTTP): no buffering, long-lived, unbuffered.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / { return 404; }
}
